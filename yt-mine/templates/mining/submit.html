{% extends "base.html" %}

{% block content %}
<h1><a href="/">yt-mine</a></h1>
<p class="helper-text">Paste a YouTube URL to transcribe and mine sentences for Anki. Each card gets audio, a screenshot, and dictionary definitions for the target word.</p>
<form method="post" action="/mining/youtube">
    <input type="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>
    <button type="submit">Submit</button>
</form>
{% endblock %}
