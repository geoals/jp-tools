<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}yt-mine{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         hsl(220, 8%, 7%);
            --bg-surface: hsl(215, 8%, 11%);
            --bg-hover:   hsl(210, 7%, 15%);
            --text:       hsl(210, 8%, 78%);
            --text-muted: hsl(210, 5%, 44%);
            --accent:       hsl(175, 50%, 48%);
            --accent-hover: hsl(175, 55%, 58%);
            --accent-dim:   hsl(175, 30%, 16%);
            --border:       hsl(210, 6%, 17%);
            --danger-bg:      hsl(0, 30%, 12%);
            --danger-border:  hsl(0, 30%, 22%);
            --danger-text:    hsl(0, 35%, 60%);
            --success-bg:     hsl(170, 25%, 11%);
            --success-border: hsl(170, 25%, 20%);
            --success-text:   hsl(170, 35%, 55%);
            --radius: 6px;
        }

        body {
            font-family: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            max-width: 780px;
            margin: 0 auto;
            padding: 32px 16px;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            letter-spacing: -0.01em;
        }

        h1 a {
            color: inherit;
            text-decoration: none;
        }

        h1 a:hover {
            color: var(--accent);
        }

        h2 {
            font-family: "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        p strong {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .helper-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        /* --- Forms --- */

        form { margin: 1rem 0; }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            padding: 0.55rem 0.75rem;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--bg-surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="url"]:focus,
        input[type="text"]:focus {
            border-color: var(--accent);
        }

        input::placeholder { color: var(--text-muted); }

        button {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            transition: background 0.15s;
        }

        button[type="submit"] {
            margin-top: 16px;
        }

        button:hover { background: var(--accent-hover); }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 1em;
            height: 1em;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        form.htmx-request .btn-text { opacity: 0.7; }
        form.htmx-request .spinner { display: inline-block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Status --- */

        .status {
            padding: 0.6rem 0.9rem;
            margin: 1rem 0;
            border-radius: var(--radius);
            font-size: 0.85rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .status:not(.done):not(.error) {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        .status.done {
            background: var(--success-bg);
            border-color: var(--success-border);
            color: var(--success-text);
        }

        .status.error {
            background: var(--danger-bg);
            border-color: var(--danger-border);
            color: var(--danger-text);
        }

        /* --- Sentence list --- */

        .sentence-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sentence-list li {
            padding: 0.5rem 0.7rem;
            background: var(--bg-surface);
            border-radius: var(--radius);
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
        }

        .sentence-list .timestamp {
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            min-width: 3.2em;
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        a.timestamp {
            text-decoration: none;
        }

        a.timestamp:hover {
            text-decoration: underline;
        }

        .play-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.8em;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 4px 0;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            line-height: 1;
            transition: color 0.12s, background 0.12s;
        }

        .play-btn:hover {
            color: var(--accent);
            background: var(--bg-hover);
        }

        .play-btn.loading {
            opacity: 0.5;
            pointer-events: none;
            animation: spin 0.6s linear infinite;
        }

        .sentence-tokens {
            font-family: "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            font-size: 1.05rem;
            line-height: 1.7;
            flex: 1;
            min-width: 0;
        }

        .token.content-word {
            cursor: pointer;
            border-radius: 3px;
            padding: 0.05em 0.1em;
            transition: background 0.1s, color 0.1s;
        }

        .token.content-word:hover {
            background: var(--accent-dim);
        }

        .token.content-word.selected {
            background: var(--accent);
            color: var(--bg);
        }

        .sentence-list li.preview-container {
            padding: 0;
            background: none;
        }

        .preview-panel {
            padding: 0.7rem 0.9rem;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .preview-header {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .preview-word {
            font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--accent);
        }

        .preview-reading {
            font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .preview-pitch {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .preview-definitions {
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .preview-definitions.preview-empty {
            color: var(--text-muted);
            font-style: italic;
        }

        .preview-sentence {
            font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .preview-sentence b {
            color: var(--accent);
            font-weight: 500;
        }

        .preview-llm {
            min-height: 1.2em;
        }

        .llm-spinner {
            display: inline-block;
            width: 0.9em;
            height: 0.9em;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .llm-definition {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text);
        }

        .llm-definition.llm-unavailable {
            color: var(--text-muted);
            font-style: italic;
        }

        .sentence-list li.exported {
            opacity: 0.5;
        }

        .sentence-list li.exported .sentence-tokens {
            text-decoration: line-through;
            text-decoration-thickness: 2px;
        }

        .sentence-list li.exported .token.content-word {
            pointer-events: none;
            cursor: default;
            padding: 0;
        }

        /* --- Export result --- */

        #export-result p {
            padding: 0.55rem 0.85rem;
            margin: 0.75rem 0;
            font-size: 0.85rem;
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
            border-radius: var(--radius);
        }

        #export-result .error {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger-text);
        }

        /* --- Scrollbar --- */

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: hsl(210, 5%, 22%); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(210, 5%, 28%); }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
