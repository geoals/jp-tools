services:
  whisper:
    build: .
    container_name: yt-mine-whisper
    volumes:
      # Share audio files between host and container
      - ./audio:/app/audio
      # Persist the HF model cache so large-v3 isn't re-downloaded on restart
      - whisper-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  whisper-cache:
