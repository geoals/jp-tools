<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}jp-tools{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 1rem; }
        form { margin: 1rem 0; }
        input[type="url"], input[type="text"] { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; }
        button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
        .status { padding: 1rem; margin: 1rem 0; border-radius: 4px; background: #f0f0f0; }
        .status.done { background: #d4edda; }
        .status.error { background: #f8d7da; }
        .sentence-list { list-style: none; padding: 0; }
        .sentence-list li { padding: 0.5rem; margin: 0.25rem 0; border: 1px solid #ddd; border-radius: 4px; display: flex; align-items: center; gap: 0.5rem; }
        .sentence-list label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; flex: 1; }
        .timestamp { color: #666; font-size: 0.85rem; }
        .play-btn { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.85rem; cursor: pointer; line-height: 1; min-width: 1.8em; }
        .play-btn:hover { background: #e8e8e8; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
