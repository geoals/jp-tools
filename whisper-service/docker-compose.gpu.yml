services:
  whisper:
    build: .
    container_name: whisper-service
    ports:
      - "8100:8100"
    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-large-v3}
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-auto}
    volumes:
      # Bind-mount host HuggingFace cache so models aren't re-downloaded
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
